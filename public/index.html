<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notice Board</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Live updates</p>
        <h1>Notice Board</h1>
      </div>
      <div class="page-actions">
        <a class="ghost-button" href="https://manishbro500.github.io/ssvt-site/public/">Home</a>
        <button class="ghost-button" id="refreshButton" type="button">Refresh</button>
      </div>
    </header>

    <main class="layout single-layout viewer-layout">
      <section class="panel viewer-panel" aria-labelledby="viewerTitle">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Viewer</p>
            <h2 id="viewerTitle">Latest Notices</h2>
          </div>
          <span class="status-pill" id="noticeCount">0 notices</span>
        </div>

        <div class="notice-list" id="noticeList" aria-live="polite"></div>
      </section>
    </main>

    <template id="noticeTemplate">
      <article class="notice-card">
        <img class="notice-image" alt="">
        <div class="notice-content">
          <time class="notice-date"></time>
          <h3></h3>
          <p></p>
        </div>
      </article>
    </template>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="/app.js" defer></script>
  </body>
</html>
