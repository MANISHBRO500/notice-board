services:
  - type: web
    name: notice-board
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: notice_board
      - key: ADMIN_PASSWORD
        sync: false
